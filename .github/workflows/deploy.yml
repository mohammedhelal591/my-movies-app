name: Angular CI/CD

# When to run this workflow
on:
  push:
    branches: [master] # Trigger workflow on every push to master branch

# Define jobs (a workflow can have multiple jobs, here we have one: build)
jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest # Use a fresh Ubuntu virtual machine to run this

    steps: # Each step is one action inside the job
      - name: Checkout code
        uses: actions/checkout@v3
        # WHY: Downloads your repo code into the VM so it can work with it

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18" # Angular 15 works well with Node 16–18
          cache: "npm" # WHY cache: Speeds up future runs by saving node_modules
        # WHY this step: The VM is a blank machine — it has nothing installed

      - name: Install dependencies
        run: npm ci
        # WHY 'npm ci' not 'npm install':
        # 'npm ci' is stricter — it uses package-lock.json exactly as-is,
        # making builds reproducible and faster in CI environments

      - name: Build (Production)
        run: npm run build -- --configuration production
        # WHY: Verifies the app compiles without errors using prod settings
        # The '--configuration production' enables optimizations (tree-shaking,
        # minification, AOT compilation) exactly like a real deployment would
  # ─────────────────────────────────────────
  # JOB 2: Deploy (CD part)
  # Only runs AFTER Job 1 succeeds
  # Only runs on pushes to master (not PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build # ← CRITICAL: won't start until 'build' job passes
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # WHY the 'if': We only want to deploy real merges to master,
    # not every PR that targets master

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production --base-href "/my-movies-app/"
        # WHY --base-href: GitHub Pages serves your app at:
        # https://username.github.io/repo-name/
        # Without this, your app loads at "/" and all assets 404.
        # Replace <YOUR-REPO-NAME> with your actual repo name!

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-movies-app
          # WHY github_token: The action needs permission to push to your repo.
          # GITHUB_TOKEN is auto-provided by GitHub — you don't create it yourself.
          # publish_dir: Where Angular outputs the built files (check your dist/ folder)
