name: Angular CI/CD

# When to run this workflow
on:
  push:
    branches: [master] # Trigger workflow on every push to master branch

# Define jobs (a workflow can have multiple jobs, here we have one: build)
jobs:
  build:
    runs-on: ubuntu-latest # Run on a fresh Ubuntu virtual machine

    steps:
      # Step 1: Get your code
      - name: Checkout repository
        uses: actions/checkout@v4
        # This clones your repo into the VM so we can run commands on it

      # Step 2: Setup Node.js environment
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Install Node.js version 18 (npm comes with it)

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
        # Reads package.json & package-lock.json and installs all packages into node_modules

      # Step 4: Build Angular app
      - name: Build Angular app
        run: npm run build -- --prod
        # Creates production-ready files in dist/<app-name>
        # Also detects code errors that prevent building

      # Step 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Authentication so the action can push to gh-pages branch
          publish_dir: ./dist/my-movies-app
          # Specifies folder to deploy (replace 'your-app-name' with actual Angular project name)
  # ─────────────────────────────────────────
  # JOB 2: Deploy (CD part)
  # Only runs AFTER Job 1 succeeds
  # Only runs on pushes to master (not PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build # ← CRITICAL: won't start until 'build' job passes
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # WHY the 'if': We only want to deploy real merges to master,
    # not every PR that targets master

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production --base-href "/my-movies-app/"
        # WHY --base-href: GitHub Pages serves your app at:
        # https://username.github.io/repo-name/
        # Without this, your app loads at "/" and all assets 404.
        # Replace <YOUR-REPO-NAME> with your actual repo name!

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-movies-app
          # WHY github_token: The action needs permission to push to your repo.
          # GITHUB_TOKEN is auto-provided by GitHub — you don't create it yourself.
          # publish_dir: Where Angular outputs the built files (check your dist/ folder)
